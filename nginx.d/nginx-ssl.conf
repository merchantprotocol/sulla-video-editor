upstream node_app {
    server 127.0.0.1:8081;
    keepalive 64;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # ── Upload + timeout limits ──
    client_max_body_size 2G;
    proxy_read_timeout 600;
    proxy_send_timeout 600;
    proxy_connect_timeout 600;

    modsecurity off;

    # SOC 2 security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    location = /status      { access_log off; log_not_found off; }

    location ~ /\. { deny all; return 403; }
    location ~ /(config|tmp|lang|vendor|node_modules) { deny all; return 403; }
    location ~ \.(sql|yml|ini|zip|sh|log)$ { deny all; return 403; }

    # Serve static files from public/
    location /public/ {
      alias /var/www/html/public/;
      expires 1h;
      add_header Pragma public;
      add_header Cache-Control "public";
    }

    # WebSocket support
    location /ws {
      proxy_pass http://node_app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;
    }

    # SSE transcription — unbuffered, very long timeout for CPU-only whisper
    location ~ ^/api/projects/[^/]+/transcribe$ {
      proxy_pass http://node_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_read_timeout 14400;
      proxy_send_timeout 14400;
    }

    # Proxy everything else to Node
    location / {
      proxy_pass http://node_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }

    # Cache static assets
    location ~ \.(gif|ico|jpg|png|svg|css|htm|html|mp3|mp4|wav|ogg|avi|ttf|eot|woff|woff2)$ {
      try_files $uri @node;
      expires 1h;
      add_header Pragma public;
      add_header Cache-Control "public";
    }

    location @node {
      proxy_pass http://node_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }

    location ~/(.*\.md|LEGALNOTICE|LICENSE) {
      default_type text/plain;
    }
}
