services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - "./:/var/www/html:rw"
      - "appdata:/data"
      - "${CAPTURES_DIR:-~/sulla/captures}:/data/captures:rw"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://sulla:sulla@db:5432/sulla_video
      - WHISPER_MODEL_PATH=/opt/whisper-models/ggml-large-v3-turbo.bin
      - DATA_DIR=/data
      - CAPTURES_DIR=/data/captures
      - INBOX_DIR=/data/inbox
      - ALIGNER_URL=http://aligner:8765
      - SULLA_API_KEY=${SULLA_API_KEY:-}
      - SULLA_CHAT_URL=${SULLA_CHAT_URL:-}
      - SULLA_BEARER_TOKEN=${SULLA_BEARER_TOKEN:-}
      - INBOX_TEMPLATE_ID=${INBOX_TEMPLATE_ID:-system-screencast}
      - WAZUH_MANAGER=${WAZUH_MANAGER:-}
      - WAZUH_AGENT_NAME=${WAZUH_AGENT_NAME:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  aligner:
    build: ./aligner
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=sulla_video
      - POSTGRES_USER=sulla
      - POSTGRES_PASSWORD=sulla
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sulla -d sulla_video"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  migrate:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - "./migrations:/migrations:ro"
    environment:
      - PGHOST=db
      - PGUSER=sulla
      - PGPASSWORD=sulla
      - PGDATABASE=sulla_video
    command: >
      sh -c '
        for f in /migrations/*.sql; do
          echo "Running migration: $$f"
          psql -f "$$f"
        done
        echo "Migrations complete"
      '

volumes:
  pgdata:
  appdata:
